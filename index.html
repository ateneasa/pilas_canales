        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }

        function aplicarFiltros() {
            var tiposActivos = [];
            document.querySelectorAll('.filtro-tipo:checked').forEach(function(cb) {
                tiposActivos.push(cb.value);
            });
            var canalesActivos = [];
            document.querySelectorAll('.filtro-canal:checked').forEach(function(cb) {
                canalesActivos.push(cb.value);
            });
            var anioActivo = document.getElementById('filtro-anio').value;

            var visibles = 0;
            var total = 0;

            layer_pilas_3.eachLayer(function(layer) {
                var props = layer.feature.properties;
                total++;
                var tipo = props.tipo || '';
                var canal = props.canal || '';
                var anio = props.cierre ? props.cierre.substring(0, 4) : '';

                var mostrar = tiposActivos.includes(tipo)
                    && canalesActivos.includes(canal)
                    && (anioActivo === 'todos' || anio === anioActivo);

                if (mostrar) {
                    layer.setStyle({ opacity: 1, fillOpacity: 1 });
                    if (layer.setRadius) layer.setRadius(8.8);
                    visibles++;
                } else {
                    layer.setStyle({ opacity: 0, fillOpacity: 0 });
                }
            });

            document.getElementById('filtros-contador').textContent =
                'Mostrando ' + visibles + ' de ' + total + ' pilas';
        }

        document.querySelectorAll('.filtro-tipo, .filtro-canal').forEach(function(cb) {
            cb.addEventListener('change', aplicarFiltros);
        });
        document.getElementById('filtro-anio').addEventListener('change', aplicarFiltros);

        document.getElementById('btn-reset').addEventListener('click', function() {
            document.querySelectorAll('.filtro-tipo, .filtro-canal').forEach(function(cb) {
                cb.checked = true;
            });
            document.getElementById('filtro-anio').value = 'todos';
            aplicarFiltros();
        });

        // Colapsar/expandir panel
        document.getElementById('filtros-titulo').addEventListener('click', function() {
            var contenido = document.getElementById('filtros-contenido');
            var titulo = document.getElementById('filtros-titulo');
            if (contenido.style.display === 'none') {
                contenido.style.display = 'block';
                titulo.classList.remove('collapsed');
            } else {
                contenido.style.display = 'none';
                titulo.classList.add('collapsed');
            }
        });

        // Impedir que los clicks en el panel afecten al mapa
        L.DomEvent.disableClickPropagation(document.getElementById('filtros-panel'));
        L.DomEvent.disableScrollPropagation(document.getElementById('filtros-panel'));

        aplicarFiltros();
        // ─────────────────────────────────────────────────────────────

        var i = 0;
        layer_PKorellana_4.eachLayer(function(layer) {
            var context = {
                feature: layer.feature,
                variables: {}
            };
            layer.bindTooltip((layer.feature.properties['PK_dehesas'] !== null?String('<div style="color: #323232; font-size: 10pt; font-weight: bold; font-family: \'Arial\', sans-serif;">' + layer.feature.properties['PK_dehesas']) + '</div>':''), {permanent: true, offset: [-0, -16], className: 'css_PKorellana_4'});
            labels.push(layer);
            totalMarkers += 1;
              layer.added = true;
              addLabel(layer, i);
              i++;
        });
        resetLabels([layer_PKorellana_4]);
        map.on("zoomend", function(){
            resetLabels([layer_PKorellana_4]);
        });
        map.on("layeradd", function(){
            resetLabels([layer_PKorellana_4]);
        });
        map.on("layerremove", function(){
            resetLabels([layer_PKorellana_4]);
        });
        </script>        
    </body>
</html>
